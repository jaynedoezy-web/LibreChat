  assistants:
    disableBuilder: false
    pollIntervalMs: 750
    timeoutMs: 180000
    supportedIds: ["asst_supportedAssistantId1"]
    capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
    retrievalModels: ["gpt-4-turbo-preview"]

# ==========
# Vector DB
# ==========
vectorDb:
  provider: "meilisearch"
  meilisearch:
    url: "${MEILI_URL}"             # e.g. http://localhost:7700 or Railway endpoint
    apiKey: "${MEILI_MASTER_KEY}"
    indexName: "librechat"
    embedModel: "text-embedding-3-small"
    batchSize: 100
    timeout: 60

# ==========
# Server
# ==========
server:
  host: 0.0.0.0
  port: 3080

# ==========
# Security
# ==========
security:
  accessCode: "solstice"   # optional, can be removed if not needed

# ==========
# Providers
# ==========
providers:
  openai:
    apiKey: "${OPENAI_API_KEY}"
  google:
    apiKey: "${GOOGLE_API_KEY}"
  perplexity:
    apiKey: "${PERPLEXITY_API_KEY}"
  brave:
    apiKey: "${BRAVE_API_KEY}"
    baseURL: "https://api.search.brave.com/res/v1"

# ==========
# Image / OCR
# ==========
secureImageLinks: true
imageOutputType: "png"

ocr:
  apiKey: "${OCR_API_KEY}"
  baseURL: "https://apis-freeocr-ai.p.rapidapi.com/ocr"

# ==========
# Endpoints
# ==========
endpoints:
  default: "brave"
  custom:
    - name: "brave"
      provider: "brave"
      models:
        default: ["search"]

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-3.5-turbo"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-3.5-turbo"
      summarize: false
      summaryModel: "gpt-3.5-turbo"
      forcePrompt: false
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: [
          "mistral-7b-instruct",
          "sonar-small-chat",
          "sonar-small-online",
          "sonar-medium-chat",
          "sonar-medium-online"
        ]
        fetch: false
      titleConvo: true
      titleModel: "sonar-medium-chat"
      summarize: false
      summaryModel: "sonar-medium-chat"
      forcePrompt: false
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

# ==========
# Features
# ==========
features:
  websearch: true
  calculator: true

interface:
  webSearch: true
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true
  modelSelect: true
  parameters: true
  presets: true
  sidePanel: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  fileSearch: true
  temporaryChatRetention: 4380 # hours

webSearch:
  searchProvider: "brave"
  maxResults: 10
  safeSearch: "off"
  enable: true

# ==========
# Memory
# ==========
memory:
  disabled: false
  validKeys:
    - "user_preferences"
    - "conversation_context"
    - "learned_facts"
    - "personal_information"
  personalize: true
  tokenLimit: 3000
  messageWindowSize: 10
  agent:
    provider: "openai"
    model: "gpt-4o"
    instructions: |
      Store memory using only the specified validKeys. For user_preferences: save 
      explicitly stated preferences about communication style, topics of interest, 
      or workflow preferences. For conversation_context: save important facts or 
      ongoing projects mentioned. For learned_facts: save objective information 
      about the user. For personal_information: save only what the user explicitly 
      shares about themselves. Delete outdated or incorrect information promptly.
    model_parameters:
      temperature: 0.2
      max_tokens: 2000
      top_p: 0.8
      frequency_penalty: 0.1
