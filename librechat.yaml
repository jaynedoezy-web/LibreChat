    pollIntervalMs: 750
    timeoutMs: 180000
    supportedIds: ["asst_supportedAssistantId1"]
    capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
    retrievalModels: ["gpt-4-turbo-preview"]

  webSearch: true
  modelSelect: true
  parameters: true
  presets: true
  sidePanel: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  fileSearch: true
  temporaryChatRetention: 4380
