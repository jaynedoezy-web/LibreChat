# LibreChat Universal RAG Configuration
# Place this file in the root of your LibreChat directory
version: 1.2.8

# ============================================
# UNIVERSAL RAG CONFIGURATION
# All models share the same RAG knowledge base
# ============================================

# Cache settings for better performance
cache: true

# Registration and user settings
registration:
  socialLogins: ['google']
  
# File upload configuration for RAG
fileConfig:
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 50  # MB
      totalSizeLimit: 500  # MB
      supportedMimeTypes:
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "text/csv"
    openAI:
      disabled: false
      fileLimit: 10
      fileSizeLimit: 50
      totalSizeLimit: 500
      supportedMimeTypes:
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    default:
      totalSizeLimit: 500
    
  # Server-wide file settings
  serverFileSizeLimit: 100
  avatarSizeLimit: 2

# ============================================
# RAG API CONFIGURATION (Universal Connector)
# ============================================
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ============================================
# MODEL ENDPOINTS - ALL USE UNIVERSAL RAG
# ============================================

endpoints:
  # OpenAI Configuration
  custom:
    - name: "OpenAI"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "https://api.openai.com/v1"
      models:
        default: 
          - "gpt-5" 
          - "gpt-5-mini"
          - "gpt-5-nano"
          - "gpt-4"
          - "gpt-4o"
        fetch: false
      titleConvo: true
      titleModel: "gpt-5-nano"
      summarize: false
      summaryModel: "gpt-5-nano"
      forcePrompt: false
      modelDisplayLabel: "OpenAI"
      # UNIVERSAL RAG ENABLED
      fileConfig:
        disabled: false
        fileLimit: 10
        fileSizeLimit: 50
        totalSizeLimit: 500
        supportedMimeTypes:
          - "application/pdf"
          - "text/plain"
          - "text/markdown"
          - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
          - "text/csv"
      # RAG uses vector store
      dropParams: ["user"]      

    # Google (Gemini) Configuration
    - name: "Google"
      apiKey: "${GOOGLE_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta"
      models:
        default:
          - "gemini-2.5-pro-latest"
          - "gemini-2.5-flash-latest"
        fetch: false
      titleConvo: true
      titleModel: "gemini-2.5-pro-latest"
      summarize: false
      summaryModel: "gemini-2.5-pro-latest"
      forcePrompt: false
      modelDisplayLabel: "Google"
      # UNIVERSAL RAG ENABLED
      fileConfig:
        disabled: false
        fileLimit: 10
        fileSizeLimit: 50
        totalSizeLimit: 500
        supportedMimeTypes:
          - "application/pdf"
          - "text/plain"
          - "text/markdown"
          - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
          - "text/csv"

    # OpenRouter (Free models) Configuration
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "deepseek/deepseek-r1-0528:free"
          - "deepseek/deepseek-r1-distill-llama-70b:free"
          - "meta-llama/llama-3.3-8b-instruct:free"
          - "meta-llama/llama-4-maverick:free"
          - "mistralai/devstral-small-2505:free"
          - "mistralai/mistral-small-3.2-24b-instruct:free"
          - "moonshotai/kimi-vl-a3b-thinking:free"
          - "openai/gpt-oss-120b:free"
          - "qwen/qwen-2.5-coder-32b-instruct:free"
          - "qwen/qwen2.5-vl-32b-instruct:free"
          - "qwen/qwen2.5-vl-72b-instruct:free"
          - "qwen/qwen3-14b:free"
          - "qwen/qwen3-8b:free"
          - "qwen/qwen3-coder:free"
        fetch: false
      modelDisplayLabel: "OpenRouter (Curated)"
      titleModel: "openai/gpt-oss-120b:free"
      summaryModel: "openai/gpt-oss-120b:free"

    # OpenRouter All Models - FIXED: Added required default array
    - name: "OpenRouter All"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: []  # Empty array allows fetch to work
        fetch: true  # Changed to true to actually fetch models
      modelDisplayLabel: "OpenRouter (All Free Models)"

# ============================================
# RAG EMBEDDING CONFIGURATION
# ============================================
# Vector DB configuration is handled via environment variables in Railway:
#
# Required RAG API Environment Variables:
# ---------------------------------------
# RAG_API_URL=http://rag-api.railway.internal:8000
# RAG_PORT=8000
# OPENAI_API_KEY=<your-key>  # For embeddings
# EMBEDDINGS_PROVIDER=openai
# EMBEDDINGS_MODEL=text-embedding-3-small
# 
# Vector Database (PGVector) Configuration:
# -----------------------------------------
# VECTOR_DB_TYPE=pgvector
# DB_HOST=<your-postgres-host>
# DB_PORT=5432
# DB_NAME=<database-name>
# DB_USER=<username>
# DB_PASSWORD=<password>
# 
# Or use connection string:
# POSTGRES_URL=postgresql://user:pass@host:5432/dbname
#
# RAG Processing Parameters:
# ---------------------------
# RAG_CHUNK_SIZE=1500
# RAG_CHUNK_OVERLAP=200
# RAG_SIMILARITY_TOP_K=5
# ============================================

# --------------------------
# MCP Servers Configuration
# --------------------------
mcpServers:
