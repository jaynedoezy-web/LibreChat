version: 1.2.8
cache: true

# ========================
# Endpoints
# ========================
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-3.5-turbo"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-3.5-turbo"
      summarize: false
      summaryModel: "gpt-3.5-turbo"
      forcePrompt: false
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: [
          "mistral-7b-instruct",
          "sonar-small-chat",
          "sonar-medium-chat"
        ]
        fetch: false
      titleConvo: true
      titleModel: "sonar-medium-chat"
      summarize: false
      summaryModel: "sonar-medium-chat"
      forcePrompt: false
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

# ========================
# Web Search
# ========================
webSearch:
  searchProvider: "serper"   # valid: serper or searxng
  maxResults: 10
  safeSearch: 0              # 0=off, 1=moderate, 2=strict
  enable: true

# ========================
# Balance
# ========================
balance:
  check: true

# ========================
# Interface (MCP + Assistants + Features)
# ========================
interface:
  mcpServers:
    zapier_gmail:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Mail"
    zapier_gdrive:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Drive"
    zapier_gcalendar:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Calendar"
    zapier_gtask:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Tasks"
    zapier_pushover:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Pushover"
    zapier_github:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "GitHub"
    zapier_notion:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Notion"

  assistants:
    disableBuilder: false
    pollIntervalMs: 750
    timeoutMs: 180000
    supportedIds: ["asst_supportedAssistantId1"]
    capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
    retrievalModels: ["gpt-4-turbo-preview"]

  webSearch: true
  modelSelect: true
  parameters: true
  presets: true
  sidePanel: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  fileSearch: true
  temporaryChatRetention: 4380
