version: 1.2.8
cache: true

# ========================
# Endpoints (including MCP references)
# ========================
endpoints:
  custom:
    - name: "zapier_gmail"
      type: "mcp"
      provider: "zapier_gmail"
    - name: "zapier_gdrive"
      type: "mcp"
      provider: "zapier_gdrive"
    - name: "zapier_gcalendar"
      type: "mcp"
      provider: "zapier_gcalendar"
    - name: "zapier_gtask"
      type: "mcp"
      provider: "zapier_gtask"
    - name: "zapier_gsheets"
      type: "mcp"
      provider: "zapier_gsheets"
    - name: "zapier_pushover"
      type: "mcp"
      provider: "zapier_pushover"
    - name: "zapier_github"
      type: "mcp"
      provider: "zapier_github"
    - name: "zapier_notion"
      type: "mcp"
      provider: "zapier_notion"

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-3.5-turbo"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-3.5-turbo"
      summarize: false
      summaryModel: "gpt-3.5-turbo"
      forcePrompt: false
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: [
          "mistral-7b-instruct",
          "sonar-small-chat",
          "sonar-medium-chat"
        ]
        fetch: false
      titleConvo: true
      titleModel: "sonar-medium-chat"
      summarize: false
      summaryModel: "sonar-medium-chat"
      forcePrompt: false
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

# ========================
# Web Search
# ========================
webSearch:
  searchProvider: "serper"   # valid: serper or searxng
  maxResults: 10
  safeSearch: 0              # 0=off, 1=moderate, 2=strict
  enable: true

# ========================
# Balance
# ========================
balance:
  check: true

# ========================
# Interface (MCP + Assistants + Features)
# ========================
interface:
  mcpServers:
    zapier_gmail:
      type: "streamable-http"
