# A minimal LibreChat configuration to demonstrate a working MCP (tool/action).
# You MUST provide your own OPENROUTER_KEY as an environment variable for this to work.

version: 1.2.8
cache: true

endpoints:
  custom:
    # 1. An "agent" model is required to use tools. We'll use OpenRouter for this.
    # Make sure to select a powerful model like GPT-4o that is good at using tools.
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-4o", "google/gemini-pro"]
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      modelDisplayLabel: "OpenRouter"

    # 2. The MCP (tool) definition.
    # This just tells LibreChat that a tool named "Petstore" exists.
    - name: "Petstore"
      type: "mcp"
      provider: "petstore_provider" # This links to the mcpServers section below.

interface:
  # 3. The server configuration for the MCP provider defined above.
  mcpServers:
    # This key MUST match the 'provider' field from the endpoint definition.
    petstore_provider:
      type: "streamable-http"
      # This URL points to the OpenAPI schema for the tool.
      # The AI model uses this schema to understand what the tool can do.
      url: "https://petstore.swagger.io/v2/swagger.json"
      timeout: 60000
      # This is the name you will see in the UI's "Actions" tab.
      title: "Swagger Petstore"

  # 4. Enable the UI features needed to see and use agents/tools.
  agents: true
  modelSelect: true