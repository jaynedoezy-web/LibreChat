# ===== Database Configuration =====
mongo:
  uri: '${MONGO_URI}'
  dbName: 'librechat'

# ===== Meilisearch Configuration =====
meilisearch:
  host: '${MEILI_HOST}'
  apiKey: '${MEILI_API_KEY}'

# ===== Web Search (Optional) =====
# You’re using Meilisearch for indexing.
# If you still want web search, set your Brave API keys below.
webSearch:
  braveApiKey: '${BRAVE_API_KEY}'
  braveGuardianSearchUrl: '${BRAVE_GUARDIAN_SEARCH_URL}'

# ===== Google Configuration =====
google:
  apiKey: '${GOOGLE_API_KEY}'
  geminiApiKey: '${GOOGLE_GEMINI_API_KEY}'
  clientId: '${GOOGLE_CLIENT_ID}'
  clientSecret: '${GOOGLE_CLIENT_SECRET}'

# ===== Authentication =====
auth:
  secret: '${AUTH_SECRET}'
  allowEmailLogin: '${ALLOW_EMAIL_LOGIN}'
  allowRegistration: '${ALLOW_REGISTRATION}'
  allowSocialLogin: '${ALLOW_SOCIAL_LOGIN}'

# ===== OpenAI Provider =====
openai:
  apiKey: '${OPENAI_API_KEY}'

# ===== Other Providers (Optional) =====
# Add more (Anthropic, OpenRouter, etc.) following the same pattern:
# anthropic:
#   apiKey: '${ANTHROPIC_API_KEY}'
# openrouter:
#   apiKey: '${OPENROUTER_API_KEY}'

# ===== Optional Features =====
features:
  enableRagApi: true
  enablePushover: false
