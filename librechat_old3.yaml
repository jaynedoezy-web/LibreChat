version: 1.2.8
cache: true

# ========================
# Config (server, security, providers, features, vectorDB)
# ========================
config:
  server:
    host: 0.0.0.0
    port: 3080

  security:
    accessCode: "solstice"

  providers:
    openai:
      apiKey: "${OPENAI_API_KEY}"
    google:
      apiKey: "${GOOGLE_API_KEY}"
    perplexity:
      apiKey: "${PERPLEXITY_API_KEY}"
    brave:
      apiKey: "${BRAVE_API_KEY}"
      baseURL: "https://api.search.brave.com/res/v1"

  features:
    websearch: true
    calculator: true

  vectorDb:
    provider: "meilisearch"
    meilisearch:
      url: "${MEILI_URL}"
      apiKey: "${MEILI_MASTER_KEY}"
      indexName: "librechat"
      embedModel: "text-embedding-3-small"
      batchSize: 100
      timeout: 60

# ========================
# Registration (OAuth)
# ========================
registration:
  socialLogins: ["discord", "facebook", "github", "google", "openid"]

# ========================
# Interface & Assistants
# ========================
interface:
  mcpServers:
    zapier_gmail:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Mail"
    zapier_gdrive:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Drive"
    zapier_gcalendar:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Calendar"
    zapier_gtask:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Tasks"
    zapier_gsheets:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Google Sheets"
    zapier_pushover:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Pushover"
    zapier_github:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "GitHub"
    zapier_notion:
      type: "streamable-http"
      url: "https://mcp.zapier.com/api/mcp/s/.../mcp"
      timeout: 60000
      title: "Notion"

  assistants:
    disableBuilder: false
    pollIntervalMs: 750
    timeoutMs: 180000
    supportedIds: ["asst_supportedAssistantId1"]
    capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
    retrievalModels: ["gpt-4-turbo-preview"]

  # UI / Features
  webSearch: true
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true
  modelSelect: true
  parameters: true
  presets: true
  sidePanel: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  fileSearch: true
  temporaryChatRetention: 4380 # hours

# ========================
# Web Search
# ========================
webSearch:
  searchProvider: "serper"   # must be serper or searxng
  maxResults: 10
  safeSearch: 0              # 0=off, 1=moderate, 2=strict
  enable: true

# ========================
# Endpoints
# ========================
endpoints:
  defaultProvider: "serper"
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-3.5-turbo"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-3.5-turbo"
      summarize: false
      summaryModel: "gpt-3.5-turbo"
      forcePrompt: false
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: [
          "mistral-7b-instruct",
          "sonar-small-chat",
          "sonar-small-online",
          "sonar-medium-chat",
          "sonar-medium-online"
        ]
        fetch: false
      titleConvo: true
      titleModel: "sonar-medium-chat"
      summarize: false
      summaryModel: "sonar-medium-chat"
      forcePrompt: false
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

# ========================
# Image / OCR
# ========================
secureImageLinks: true
imageOutputType: "png"

ocr:
  apiKey: "${OCR_API_KEY}"
  baseURL: "https://apis-freeocr-ai.p.rapidapi.com/ocr"

# ========================
# Memory
# ========================
memory:
  disabled: false
  validKeys:
    - "user_preferences"
    - "conversation_context"
    - "learned_facts"
    - "personal_information"
  personalize: true
  tokenLimit: 3000
  messageWindowSize: 10
  agent:
    provider: "openai"
    model: "gpt-4o"
    instructions: |
      Store memory using only the specified validKeys. For user_preferences: save 
      explicitly stated preferences about communication style, topics of interest, 
      or workflow preferences. For conversation_context: save important facts or 
      ongoing projects mentioned. For learned_facts: save objective information 
      about the user. For personal_information: save only what the user explicitly 
      shares about themselves. Delete outdated or incorrect information promptly.
    model_parameters:
      temperature: 0.2
      max_tokens: 2000
      top_p: 0.8
      frequency_penalty: 0.1

# ========================
# Balance
# ========================
balance:
  check: true
