version: 1.2.8
cache: true

# ========================
# Server & Security
# ========================
server:
  host: 0.0.0.0
  port: 3080

security:
  accessCode: "solstice"

# ========================
# Providers
# ========================
providers:
  openai:
    apiKey: "${OPENAI_API_KEY}"
  google:
    apiKey: "${GOOGLE_API_KEY}"
  perplexity:
    apiKey: "${PERPLEXITY_API_KEY}"
  brave:
    apiKey: "${BRAVE_API_KEY}"
    baseURL: "https://api.search.brave.com/res/v1"

# ========================
# Features
# ========================
features:
  websearch: true
  calculator: true

# ========================
# Vector DB
# ========================
vectorDb:
  provider: "meilisearch"
  meilisearch:
    url: "${MEILI_URL}"
    apiKey: "${MEILI_MASTER_KEY}"
    indexName: "librechat"
    embedModel: "text-embedding-3-small"
    batchSize: 100
    timeout: 60

# ========================
# Endpoints
# ========================
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-3.5-turbo"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-3.5-turbo"
      summarize: false
      summaryModel: "gpt-3.5-turbo"
      forcePrompt: false
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: [
          "mistral-7b-instruct",
          "sonar-small-chat",
          "sonar-medium-chat"
        ]
        fetch: false
      titleConvo: true
      titleModel: "sonar-medium-chat"
      summarize: false
      summaryModel: "sonar-medium-chat"
      forcePrompt: false
      dropParams: ["stop", "frequency_penalty"]
      modelDisplayLabel: "Perplexity"

# ========================
# Web Search
# ========================
webSearch:
  searchProvider: "serper"   # valid: serper or searxng
  maxResults: 10
  safeSearch: 0              # 0=off, 1=moderate, 2=strict
  enable: true

# ========================
# Balance
# ========================
balance:
  check: true
